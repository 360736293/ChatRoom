<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" type="text/css" href="css/style.css">
        <title>ChatRoom</title>
    </head>
    <body>
        <div class="container">
            <!-- 服务器侧边栏 -->
            <div class="server-sidebar">
                <div class="server-icon active">
                    <span style="font-size: 20px; font-weight: bold;">A</span>
                </div>
            </div>
            <!-- 频道侧边栏 -->
            <div class="channel-sidebar">
                <div class="server-header">
                    我的聊天室
                </div>
                <div class="channel-list">
                    <div class="channel-category">文字频道</div>
                    <div class="channel-item active">
                        <span>频道1</span>
                    </div>
                </div>
            </div>
            <!-- 主聊天区域 -->
            <div class="main-content">
                <div class="chat-header">
                    <h3>频道1</h3>
                </div>
                <div class="messages-container" id="messagesContainer">
                </div>
                <!-- 正在输入指示器 -->
                <div class="typing-indicator" id="typingIndicator" style="display: none;">
                    <div class="typing-content">
                        <div class="typing-dots">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                        <span class="typing-text" id="typingText"></span>
                    </div>
                </div>
                <div class="message-input-container">
                    <!-- 图片预览区域 -->
                    <div class="image-preview-container" id="imagePreviewContainer">
                        <div class="preview-info" id="previewInfo"></div>
                        <img class="preview-image" id="previewImage" alt="预览">
                        <div class="preview-actions">
                            <button class="remove-preview-button" id="removePreviewButton">移除图片</button>
                        </div>
                    </div>
                    <div class="message-input-wrapper">
                        <input type="text" class="message-input" placeholder="给 #频道1 发消息" id="messageInput">
                        <input type="file" class="file-input" id="fileInput" accept="image/jpeg,image/jpg,image/png">
                        <button class="image-button" id="imageButton" title="上传图片">📎</button>
                        <button class="emoji-button" id="emojiButton">😀</button>
                        <button class="send-button" id="sendButton">发送</button>
                    </div>
                </div>
                <div class="emoji-picker" id="emojiPicker">
                    <div class="emoji-categories">
                        <button class="category-btn active" data-category="smileys">😀</button>
                        <button class="category-btn" data-category="gestures">👋</button>
                        <button class="category-btn" data-category="animals">🐶</button>
                        <button class="category-btn" data-category="food">🍕</button>
                        <button class="category-btn" data-category="activities">⚽</button>
                        <button class="category-btn" data-category="objects">💡</button>
                        <button class="category-btn" data-category="symbols">❤️</button>
                    </div>
                    <div class="emoji-grid" id="emojiGrid">
                        <!-- 表情将通过JavaScript动态生成 -->
                    </div>
                </div>
            </div>
            <!-- 用户列表 -->
            <div class="user-sidebar">
                <!-- 用户列表将通过JavaScript动态生成 -->
            </div>
        </div>

        <!-- 使用ES6模块加载主文件 -->
        <script type="module" src="js/main.js"></script>
    </body>
</html>
